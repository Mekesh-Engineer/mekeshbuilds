<!DOCTYPE html>
<html lang="en" data-mode="light" data-theme="default">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Metadata ──────────────────────────────────────────────── -->
    <title>MekeshBuilds</title>
    <meta name="description"
        content="Mekeshkumar — Full Stack Developer, Embedded Engineer & UI/UX Designer. Portfolio of engineering excellence." />
    <meta name="author" content="Mekeshkumar" />
    <meta name="keywords" content="Mekeshkumar, portfolio, full stack, embedded, VLSI, PCB, UI UX, React, Supabase" />
    <meta name="robots" content="index, follow" />

    <!-- ── Theme Color (matches --sys-accent #ff6b2c) ────────────────────── -->
    <meta name="theme-color" content="#ff6b2c" />

    <!-- ── Favicon (SVG only) ────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── PWA manifest ──────────────────────────────────────────────────── -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mekeshbuilds.dev/" />
    <meta property="og:title" content="MekeshBuilds — Engineering & Design Portfolio" />
    <meta property="og:description"
        content="Full Stack Development, Embedded Engineering, VLSI Design, PCB Design & UI/UX — all under one roof." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MekeshBuilds" />
    <meta name="twitter:description" content="Full Stack, Embedded & UI/UX portfolio by Mekeshkumar." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter — body & UI text -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <!-- Material Icons (Round variant) — used throughout the app -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

</head>

<body>
    <div id="root"></div>

    <!-- Vite / React entry point -->
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
