<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#9c3e00",
                        "on-secondary-fixed": "#552800",
                        "primary-fixed-dim": "#ee6d23",
                        "surface": "#f9f6f5",
                        "surface-container-low": "#f3f0ef",
                        "primary-dim": "#893600",
                        "surface-dim": "#d6d4d3",
                        "error-dim": "#b92902",
                        "secondary": "#904800",
                        "on-secondary-container": "#723700",
                        "secondary-fixed-dim": "#ffb37d",
                        "surface-tint": "#9c3e00",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#7b5400",
                        "on-tertiary-fixed": "#372400",
                        "error": "#b02500",
                        "surface-container-highest": "#dfdcdc",
                        "surface-variant": "#dfdcdc",
                        "on-primary-container": "#401500",
                        "tertiary-fixed-dim": "#eca60f",
                        "inverse-on-surface": "#9e9c9c",
                        "error-container": "#f95630",
                        "on-error-container": "#520c00",
                        "surface-container": "#eae7e7",
                        "surface-container-high": "#e4e2e1",
                        "tertiary-dim": "#6b4900",
                        "on-error": "#ffefec",
                        "on-tertiary": "#fff1df",
                        "inverse-surface": "#0e0e0e",
                        "on-secondary-fixed-variant": "#803f00",
                        "on-primary": "#fff0ea",
                        "secondary-container": "#ffc6a0",
                        "on-surface": "#2f2f2e",
                        "secondary-fixed": "#ffc6a0",
                        "on-surface-variant": "#5c5b5b",
                        "on-primary-fixed": "#000000",
                        "tertiary-container": "#fbb423",
                        "tertiary-fixed": "#fbb423",
                        "inverse-primary": "#ff7a30",
                        "background": "#f9f6f5",
                        "primary-container": "#ff7a30",
                        "outline": "#787676",
                        "on-secondary": "#fff0e8",
                        "surface-bright": "#f9f6f5",
                        "on-primary-fixed-variant": "#4f1c00",
                        "on-background": "#2f2f2e",
                        "on-tertiary-container": "#523700",
                        "secondary-dim": "#7e3e00",
                        "on-tertiary-fixed-variant": "#5e4000",
                        "primary-fixed": "#ff7a30",
                        "outline-variant": "#afadac"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        .glass-dark {
            background-color: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface">
    <!-- Shared Component: TopNavBar -->
    <nav
        class="fixed top-0 w-full z-50 h-20 glass-dark border-b border-white/10 flex justify-between items-center px-8 shadow-[0_8px_32px_rgba(156,62,0,0.08)]">
        <!-- Left: Brand & Breadcrumb -->
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3 group cursor-pointer">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-on-primary font-black italic tracking-tighter text-xl shadow-lg shadow-primary/20 transition-transform active:scale-95">
                    MB
                </div>
                <div class="hidden md:flex flex-col">
                    <span
                        class="text-white font-headline font-extrabold tracking-tight text-sm leading-none">Dashboard</span>
                    <span class="text-stone-500 font-label text-[10px] uppercase tracking-widest mt-1">Command
                        Center</span>
                </div>
            </div>
            <div class="hidden lg:flex items-center gap-6 ml-4">
                <a class="text-orange-500 font-headline font-extrabold border-b-2 border-orange-500 pb-1 text-sm tracking-tight transition-all"
                    href="#">Projects</a>
                <a class="text-stone-400 font-headline font-bold text-sm tracking-tight hover:text-stone-100 transition-colors duration-300"
                    href="#">Team</a>
                <a class="text-stone-400 font-headline font-bold text-sm tracking-tight hover:text-stone-100 transition-colors duration-300"
                    href="#">Analytics</a>
            </div>
        </div>
        <!-- Center: Global Fuzzy Search -->
        <div class="flex-1 max-w-md px-8">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span
                        class="material-symbols-outlined text-stone-500 group-focus-within:text-orange-500 transition-colors">search</span>
                </div>
                <input
                    class="w-full bg-stone-800/40 border-0 rounded-full py-2.5 pl-11 pr-4 text-stone-200 placeholder-stone-500 font-body text-sm focus:ring-2 focus:ring-orange-500/50 focus:bg-stone-800/60 transition-all duration-300 outline-none w-full group-focus-within:scale-105"
                    placeholder="Fuzzy search commands..." type="text" />
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <span
                        class="text-[10px] font-bold text-stone-600 bg-stone-900 px-1.5 py-0.5 rounded border border-white/5 tracking-tighter">CMD
                        + K</span>
                </div>
            </div>
        </div>
        <!-- Right: Actions & Profile -->
        <div class="flex items-center gap-4">
            <!-- Notifications -->
            <button
                class="relative w-10 h-10 flex items-center justify-center rounded-full text-stone-400 hover:bg-orange-500/10 hover:text-orange-400 transition-all duration-300 active:scale-95">
                <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
                <span
                    class="absolute top-2.5 right-2.5 w-2 h-2 bg-orange-500 rounded-full border-2 border-[#0A0A0F]"></span>
            </button>
            <!-- Settings -->
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full text-stone-400 hover:bg-orange-500/10 hover:text-orange-400 transition-all duration-300 active:scale-95">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
            </button>
            <div class="h-8 w-[1px] bg-white/10 mx-2"></div>
            <!-- Profile Dropdown -->
            <div class="flex items-center gap-3 pl-2 cursor-pointer group">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-bold text-stone-100 font-headline leading-none">Alex Rivera</p>
                    <p class="text-[10px] text-stone-500 font-label mt-1">Lead Architect</p>
                </div>
                <div class="relative">
                    <img alt="User avatar"
                        class="w-10 h-10 rounded-full object-cover border-2 border-white/10 group-hover:border-orange-500/50 transition-all duration-300"
                        data-alt="Close-up professional portrait of a confident man with a slight smile in a high-end architectural studio background with soft natural lighting"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYfyOz_pU-ebWO7lBmF41VTSBQBLx04RnelnsP7XTz3_R1W3IyftC_9HnPEy0dZV1Mt42_CJeQUTsasPubLYP4rTEq0PtdbaIrRu2st6mQUNlpDcDa0sVAFJSlA75zQja5YqdQzZbfuP2mxu52gsUw78jGebVHoLrPlqQ-n_BDrTaCkkkkUDekO3v1gv11Xqt0sIX1VoYuRq1iRwIoIJu8pHtgwF1tBEtXqq3h4GKtSkTe_Klp9Oq-Y2srdB1PYmIIyTGcEntfzDnS" />
                    <div
                        class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-[#0A0A0F]">
                    </div>
                </div>
            </div>
        </div>
    </nav>


</body>

</html>
